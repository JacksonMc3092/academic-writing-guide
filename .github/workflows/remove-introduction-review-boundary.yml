name: Remove Introduction Review Boundary

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-introduction-review-boundary.yml

permissions:
  contents: write

jobs:
  remove-review-boundary:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out production
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Remove internal review note
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('1010/introduction.html')
          text = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'<section class="section" id="section-review-boundary">.*?</section>(?=<nav aria-label="Chapter sequence")',
              re.S,
          )
          revised, count = pattern.subn('', text, count=1)
          if count != 1:
              raise SystemExit(f'Expected one Review Boundary section, found {count}')
          if 'Review Boundary' in revised or 'substantive review draft only' in revised:
              raise SystemExit('Review Boundary language remains after cleanup')
          path.write_text(revised, encoding='utf-8')
          PY

      - name: Verify introduction structure
        run: |
          grep -q 'Attribution and Works Consulted' 1010/introduction.html
          grep -q 'chapter-sequence-nav' 1010/introduction.html
          grep -q 'Chapter 1: Active Reading Strategies' 1010/introduction.html
          ! grep -q 'Review Boundary' 1010/introduction.html

      - name: Commit cleaned introduction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 1010/introduction.html
          git commit -m "Remove internal review note from introduction"
          git push origin HEAD:main
