name: Run ENG 1010 Progress Repair

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-eng1010-progress-repair.yml

permissions:
  contents: write

jobs:
  repair-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out production
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build isolated progress module
        run: python tools/build_eng1010_progress_fix.py

      - name: Static validation
        run: |
          node --check eng1010-progress.js
          test "$(grep -l 'data-sc-progress="1"' 1010/*.html | wc -l)" -eq 16
          grep -q 'scholarsCompass:1010:completedChapters' eng1010-progress.js
          grep -q 'id="overallProgress"' 1010/index.html
          grep -q 'class="chapter-sequence-nav"' 1010/chapter-1.html

      - name: Install browser test tools
        run: |
          python -m pip install --disable-pip-version-check playwright
          python -m playwright install --with-deps chromium

      - name: Run browser regression
        run: |
          python -m http.server 8000 > /tmp/scholars-compass-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          python tools/test_eng1010_progress.py

      - name: Commit tested repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eng1010-progress.js 1010/*.html
          git commit -m "Repair ENG 1010 chapter progress tracking"
          git push origin HEAD:main
