name: Deploy Approved ENG 1010

on:
  push:
    branches:
      - deploy-eng1010-july-2026
    paths:
      - .github/workflows/deploy-approved-eng1010.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/deploy-approved-eng1010.yml
      - tools/deploy_approved_eng1010.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out deployment branch
        uses: actions/checkout@v4
        with:
          ref: deploy-eng1010-july-2026
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Deploy approved preview package
        run: |
          set -o pipefail
          python tools/deploy_approved_eng1010.py 2>&1 | tee deploy-eng1010.log

      - name: Confirm protected production areas are unchanged
        run: |
          if git diff --name-only | grep -E '^(1020/|index\.html$)'; then
            echo 'Protected production paths changed unexpectedly.'
            exit 1
          fi
          test -f 1010/introduction.html
          test -f 1010/chapter-12-tools.js
          test -f revision-round-2.js

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eng1010-production-deployment-diagnostics
          path: |
            deploy-eng1010.log
            1010/
            revision-round-2.css
            revision-round-2.js
          if-no-files-found: warn

      - name: Commit verified production files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            1010 \
            app.js \
            interactive-tools.js \
            styles.css \
            stabilization-0.2.css \
            revision-round-2.css \
            revision-round-2.js \
            favicon.svg \
            assets/revision-companion.pdf \
            assets/revision-companion.txt
          if git diff --cached --quiet; then
            echo 'No production changes were generated.'
            exit 1
          fi
          git commit -m "Deploy approved ENG 1010 revision"
          git push origin HEAD:deploy-eng1010-july-2026
